name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

# Required permissions for GitHub Pages deployment via Actions
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          # Determine the correct base path for GitHub Pages.
          # - Project sites (most repos): https://<user>.github.io/<repo-name>/
          # - User/organization root sites (e.g. <user>.github.io): served from /
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          BASE_PATH="/${REPO_NAME}/"

          if [[ "${{ github.repository }}" == "${OWNER}.github.io" ]]; then
            BASE_PATH="/"
          fi

          echo "Building with base: ${BASE_PATH}"
          npm run build -- --base="${BASE_PATH}"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the Vite build output
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
